<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="robots" content="noindex, follow">
<title>Savannah Stories & Hauntings Tour - Free Interactive Ghost Tour</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Georgia,serif;background:#1a1410;overflow:hidden}
.tour-container{display:flex;height:100vh}
#map{flex:1;background:#2a2520}
.sidebar{width:420px;background:linear-gradient(180deg,#3d2817,#2a1810);border-left:3px solid #8b7355;overflow-y:auto;padding:20px;box-shadow:-5px 0 20px rgba(0,0,0,0.5)}
.header{text-align:center;border-bottom:2px solid #8b7355;padding-bottom:12px;margin-bottom:12px}
.header h1{font-size:18px;color:#c9a876;margin-bottom:5px}
.header p{font-size:9px;color:#8b7355}
.voice-selector{margin:10px 0;padding:8px;background:rgba(139,115,85,0.1);border-radius:3px}
.voice-selector label{font-size:9px;color:#c9a876;display:block;margin-bottom:5px}
.voice-selector select{width:100%;padding:5px;background:#2a1810;color:#c9a876;border:1px solid #8b7355;border-radius:3px;font-size:9px}
.stats{background:rgba(139,115,85,0.1);border:1px solid #8b7355;border-radius:4px;padding:10px;margin-bottom:10px;font-size:10px}
.stats h3{color:#c9a876;margin-bottom:5px}
.stat-item{display:flex;justify-content:space-between;margin-bottom:3px}
.location-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;max-height:300px;overflow-y:auto}
.location-card{background:rgba(139,115,85,0.08);border-left:4px solid #8b7355;padding:8px;border-radius:3px;cursor:pointer;transition:all 0.3s;font-size:9px}
.location-card:hover{background:rgba(139,115,85,0.15);border-color:#c9a876}
.location-card.active{background:rgba(201,168,118,0.2);border-color:#c9a876}
.location-name{font-size:11px;font-weight:bold;color:#c9a876;margin-bottom:2px}
.location-type{font-size:8px;color:#8b7355}
.location-story{font-size:9px;color:#a89968;line-height:1.3;margin-top:4px}
button{width:100%;padding:8px;background:linear-gradient(135deg,#8b7355,#6b5344);color:#f5f5dc;border:none;border-radius:3px;cursor:pointer;font-size:10px;font-weight:bold;text-transform:uppercase;box-shadow:0 0 10px rgba(139,115,85,0.3);margin-top:10px;transition:all 0.3s}
button:hover{background:linear-gradient(135deg,#a89968,#8b7d60)}
.proximity-alert{display:none;background:rgba(201,168,118,0.2);border:2px solid #c9a876;padding:10px;margin-top:10px;border-radius:3px;color:#c9a876;font-size:9px;text-align:center}
@media(max-width:1024px){.tour-container{flex-direction:column}#map{height:60%}.sidebar{width:100%;height:40%;border-left:none;border-top:3px solid #8b7355}}
.location-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid #8b7355;display:flex;align-items:center;justify-content:center}
.location-dot.haunted div{width:14px;height:14px;border-radius:50%;background:#c9a876;box-shadow:0 0 10px rgba(201,168,118,0.5)}
.location-dot.blessed div{width:14px;height:14px;border-radius:50%;background:#66bb6a;box-shadow:0 0 10px rgba(102,187,106,0.5)}
.location-dot:hover div{transform:scale(1.3)}
.location-label{background:rgba(0,0,0,0.7) !important;color:#c9a876 !important;border:none !important;border-radius:3px;padding:4px 8px !important;font-size:11px !important;font-family:Georgia,serif;font-weight:bold;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.5)}
.user-location-dot{width:16px;height:16px;border-radius:50%;cursor:pointer;border:2px solid #2196F3;display:flex;align-items:center;justify-content:center}
.user-location-dot div{width:10px;height:10px;border-radius:50%;background:#2196F3;box-shadow:0 0 8px rgba(33,150,243,0.6)}
.user-location-label{background:rgba(33,150,243,0.9) !important;color:#ffffff !important;border:none !important;border-radius:3px;padding:4px 8px !important;font-size:10px !important;font-family:Georgia,serif;font-weight:bold;white-space:nowrap;box-shadow:0 2px 8px rgba(33,150,243,0.5)}
.coord-editor{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#2a1810;border:2px solid #8b7355;padding:20px;border-radius:5px;z-index:1000;width:400px;box-shadow:0 0 30px rgba(0,0,0,0.8)}
.coord-editor.active{display:block}
.coord-editor h3{color:#c9a876;margin-bottom:15px;font-size:14px}
.coord-editor label{color:#a89968;display:block;margin-top:10px;font-size:11px}
.coord-editor input{width:100%;padding:8px;margin-top:5px;background:#1a1410;color:#c9a876;border:1px solid #8b7355;border-radius:3px;font-family:monospace;font-size:12px;box-sizing:border-box}
.coord-editor .buttons{display:flex;gap:10px}
.coord-editor button{flex:1;padding:10px;margin-top:15px;background:#8b7355;color:#f5f5dc;border:none;border-radius:3px;cursor:pointer;font-size:11px}
.coord-editor button:hover{background:#a89968}
.coord-editor .close{position:absolute;top:10px;right:15px;cursor:pointer;color:#c9a876;font-size:20px;font-weight:bold}
.coord-editor .close:hover{color:#d4c5b9}
</style>
</head>

<div class="buttons">

<button onclick="deleteLocation()" style="background:#c9534f;margin:0;flex:1">Delete</button>

</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
let locations=[{name:"BONUS: Wilder House Opening",lat:32.063892,lng:-81.093253,type:"Blessed",story:"Welcome to the Wilder House. Before we step out, I want you to know you are standing in a protected place. Reverend Wilder blessed these walls long ago, and that blessing still holds. Nothing we encounter tonight will follow you back here. This house is your sanctuary. Breathe easy. When you're ready, we'll walk west along Park Avenue — just five minutes — and begin where Savannah starts to open its memory to us."},{name:"OPENING: South Forsyth Park",lat:32.06501,lng:-81.097223,type:"Historic Park",story:"You didn't just come to Savannah. Savannah called you here. This city does not haunt the way most people think. It remembers. It carries its past in deep, layered memory — some parts gentle, some heavy, some still unfinished. Tonight we walk north from the southern edge of Forsyth Park all the way to the river. With every step, the city will slowly reveal more of itself. What begins as individual memories will gradually become one single, continuous story. Stay close. Listen carefully. Let Savannah tell you what it remembers."},{name:"STOP 1: Telfair Hospital",lat:32.064674,lng:-81.096386,type:"Historic Hospital",story:"Our journey begins with a memory of will — strong and unyielding. Mary Telfair built this hospital as a sanctuary for women only. No men allowed. That was her unbreakable rule. When she died, she chose to stay. She still walks these halls — a tall figure in a long brown dress. Her lavender perfume appears without warning. Doors close with quiet purpose. Some men still feel her presence gently but firmly reminding them: this space has its boundaries. Even now, Mary protects what she built. This is how Savannah remembers strength. Let's keep walking north… and the city begins to show us something softer."},{name:"STOP 2: Forsyth Park Fountain",lat:32.06922,lng:-81.095635,type:"Haunted Park",story:"Here, strength gives way to sorrow. This fountain is one of Savannah's most beloved images — graceful and beautiful. But beauty in this city often holds deeper truths beneath its surface. A fourteen-year-old girl named Lottie once lived with a terrible secret. In confusion, she poisoned a woman she believed was her rival… only to discover it was her own mother. The truth, hidden by polite Savannah society, shattered her completely. She never recovered. Her spirit returned to this fountain — the most beautiful place she knew. People still see a young girl near the water. Sometimes peaceful. Sometimes overwhelmed with regret. Many feel waves of guilt and sadness pass through them. This is Savannah remembering the pain that beauty tries, but cannot fully hide. Let's continue walking north. The memories are growing older now."},{name:"STOP 3: Green-Meldrim House",lat:32.073902,lng:-81.094079,type:"Historic Mansion",story:"As we move deeper into the city, we meet a memory of bondage and beauty. In 1864, General Sherman occupied this mansion as his headquarters. But the presence that still lingers here belongs to an enslaved woman who worked inside these walls. Even while enslaved, she found moments of freedom in music. She would pause her labor whenever orchestras played, letting the melodies lift her. Today, people hear that same phantom music drifting through empty rooms. They feel a quiet, purposeful presence still moving through the house — still reaching for beauty in a world that tried to deny it to her. Savannah remembers those who were silenced… but whose spirits refused to be erased. Let's keep walking."},{name:"STOP 4: Chippewa Square",lat:32.075843,lng:-81.093124,type:"Historic Square",story:"Now the memory shifts again — this time into interruption. Inside the Foley House Inn, workers discovered a human skeleton hidden inside a wall in 1987. A man had entered Honoria Foley's room with harmful intentions. She defended herself with a candlestick. Rather than face the truth, they sealed his body inside the wall. They call him Wally. Guests still see him — a man in 19th-century clothing who vanishes when looked at directly. One maid returned to find a perfectly set table destroyed, as if someone had finally sat down to eat in the house that became his tomb. Across the square, actress Betty still watches performances at the Savannah Theatre. She loved the stage so deeply she could never truly leave. Some wounds in Savannah refuse to close. Some stories refuse to end. Let's keep walking."},{name:"STOP 5: Owens-Thomas House",lat:32.076213,lng:-81.093213,type:"Historic Mansion",story:"Here we feel a memory of ownership and attachment. Margaret Thomas, known as the Lady in Gray, still tends these gardens she loved in life. People see her moving among the plants in a flowing gray dress. Inside the house, Mr. Owens appears — large and stern — watching visitors with the judgment of a man who still believes he owns what he built. He turns and walks straight through walls as if they don't exist. Sometimes you hear a match strike, followed by the rich, impossible scent of 19th-century pipe tobacco. These spirits are not angry. They are simply unwilling to release what they cherished. The city's memory is becoming heavier now. Let's continue toward the cemetery."},{name:"STOP 6: Colonial Park Cemetery",lat:32.076116,lng:-81.090356,type:"Historic Cemetery",story:"This place holds a memory that is almost too much to contain. Over 10,000 people are buried in these six acres. Most without names or markers. Revolutionary soldiers. Yellow fever victims. Enslaved people. Forgotten families. At night, some still see Revolutionary War soldiers marching in formation — still drilling as if the war never ended. This ground carries too much pain, too many lost lives, and too much history to ever rest completely. We are getting closer to the river now… where everything finally comes together."},{name:"STOP 7: Pulaski Monument",lat:32.077388,lng:-81.09005,type:"Historic Monument",story:"Before we reach the water, we pass a memory of honor. Casimir Pulaski was mortally wounded nearby in 1779. His remains rest beneath this monument. At dusk, colonial soldiers sometimes appear around it, standing at attention, saluting their commander with quiet loyalty. Not every memory in Savannah remains broken. Some have found peace. One final walk now."},{name:"STOP 8: Emmet Park & Savannah River",lat:32.080375,lng:-81.088972,type:"Historic Park",story:"And now… we have reached the place where all the layers become one. For nearly 300 years, this river carried Savannah's deepest wound — the arrival and suffering of countless enslaved Africans. Tens of thousands passed through these docks in chains. At twilight, many hear voices rising from the water — fragments of African languages and Gullah carried on the breeze. Not in rage… but quietly insisting: Remember us. The river does not separate the stories we walked through tonight. It holds them all. Mary's iron will. Lottie's sorrow. The enslaved woman's music. Wally's unfinished anger. The Lady in Gray's devotion. The soldiers' endless march. You have walked through the living memory of Savannah tonight. And now that memory walks with you. Carry these stories gently. Speak them when you can. That is all the city asks."}];

const voiceMap={OldLady:"0rEo3eAjssGDUCXHYENf",OldMan:"dtVZnErhiiosqofxDzSH"};

// Pre-generated audio file map
const audioFileMap={
  "BONUS: Wilder House Opening":{OldMan:"/audio/wilder-house-opening-oldman.mp3",OldLady:"/audio/wilder-house-opening-oldlady.mp3"},
  "OPENING: South Forsyth Park":{OldMan:"/audio/forsyth-park-opening-oldman.mp3",OldLady:"/audio/forsyth-park-opening-oldlady.mp3"},
  "STOP 1: Telfair Hospital":{OldMan:"/audio/stop-1-telfair-hospital-oldman.mp3",OldLady:"/audio/stop-1-telfair-hospital-oldlady.mp3"},
  "STOP 2: Forsyth Park Fountain":{OldMan:"/audio/stop-2-forsyth-fountain-oldman.mp3",OldLady:"/audio/stop-2-forsyth-fountain-oldlady.mp3"},
  "STOP 3: Green-Meldrim House":{OldMan:"/audio/stop-3-green-meldrim-oldman.mp3",OldLady:"/audio/stop-3-green-meldrim-oldlady.mp3"},
  "STOP 4: Chippewa Square":{OldMan:"/audio/stop-4-chippewa-square-oldman.mp3",OldLady:"/audio/stop-4-chippewa-square-oldlady.mp3"},
  "STOP 5: Owens-Thomas House":{OldMan:"/audio/stop-5-owens-thomas-oldman.mp3",OldLady:"/audio/stop-5-owens-thomas-oldlady.mp3"},
  "STOP 6: Colonial Park Cemetery":{OldMan:"/audio/stop-6-colonial-cemetery-oldman.mp3",OldLady:"/audio/stop-6-colonial-cemetery-oldlady.mp3"},
  "STOP 7: Pulaski Monument":{OldMan:"/audio/stop-7-pulaski-monument-oldman.mp3",OldLady:"/audio/stop-7-pulaski-monument-oldlady.mp3"},
  "STOP 8: Emmet Park & Savannah River":{OldMan:"/audio/stop-8-emmet-river-oldman.mp3",OldLady:"/audio/stop-8-emmet-river-oldlady.mp3"}
};

let map,selectedLocation=null,geofencingActive=false,userLocation=null,markers=[],currentEditingIndex=null,adminMode=false,routePolyline=null,currentSegmentPolyline=null,userMarker=null;
const GEOFENCE_RADIUS=200;
const ADMIN_PASSWORD='savannah2024';

function initMap(){
map=L.map('map').setView([32.0730,-81.0900],14);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
attribution:'Map data &copy; OpenStreetMap, CartoDB',maxZoom:19
}).addTo(map);

markers=[];
locations.forEach((loc,idx)=>{
const icon=L.divIcon({className:'location-dot '+(loc.type.includes('Blessed')?'blessed':'haunted'),html:'<div></div>',iconSize:[20,20],iconAnchor:[10,10]});
const marker=L.marker([loc.lat,loc.lng],{icon,draggable:true}).addTo(map);
markers.push(marker);
marker.bindTooltip(loc.name,{permanent:true,direction:'right',offset:[10,0],className:'location-label'});
marker.on('click',()=>{
selectLocationByIndex(idx);
if(adminMode)openCoordEditor(idx);
});
marker.on('dragend',()=>{
if(!adminMode)return;
const newLat=marker.getLatLng().lat;
const newLng=marker.getLatLng().lng;
locations[idx].lat=parseFloat(newLat.toFixed(6));
locations[idx].lng=parseFloat(newLng.toFixed(6));
document.getElementById('coordLat').value=locations[idx].lat;
document.getElementById('coordLng').value=locations[idx].lng;
saveToStorage();
});
});

// Create complete tour route polyline
const routeCoords=locations.map(loc=>[loc.lat,loc.lng]);
routePolyline=L.polyline(routeCoords,{color:'#c9a876',weight:3,opacity:0.3,dashArray:'5,5'}).addTo(map);

renderLocationList();
updateStats();
}

function selectLocationByIndex(idx){
selectedLocation=idx;
highlightCurrentSegment(idx);
renderLocationList();
playNarration(idx);
}

function highlightCurrentSegment(idx){
if(currentSegmentPolyline)map.removeLayer(currentSegmentPolyline);
if(idx<locations.length-1){
const current=[locations[idx].lat,locations[idx].lng];
const next=[locations[idx+1].lat,locations[idx+1].lng];
currentSegmentPolyline=L.polyline([current,next],{color:'#c9a876',weight:5,opacity:1}).addTo(map);
currentSegmentPolyline.bringToFront();
}
}

async function playNarration(idx){
const loc=locations[idx];
const audio=document.getElementById('narrationAudio');
const selectedVoice=document.getElementById('voiceSelect').value;

// Ensure audio is unmuted and at full volume
audio.muted=false;
audio.volume=1.0;

// Show audio controls so user can play if autoplay is blocked
audio.controls=true;
audio.style.display='block';
audio.style.position='fixed';
audio.style.bottom='10px';
audio.style.left='50%';
audio.style.transform='translateX(-50%)';
audio.style.zIndex='9999';
audio.style.width='320px';
audio.style.background='rgba(20,20,30,0.95)';
audio.style.borderRadius='4px';

// Show loading status
let statusEl=document.getElementById('narrationStatus');
if(!statusEl){
statusEl=document.createElement('div');
statusEl.id='narrationStatus';
statusEl.style.cssText='position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:rgba(201,168,118,0.95);color:#1a1a2e;padding:6px 12px;border-radius:3px;font-size:11px;font-weight:bold;z-index:9999;box-shadow:0 2px 8px rgba(0,0,0,.4)';
document.body.appendChild(statusEl);
}
statusEl.textContent='🔮 Loading narration for: '+loc.name;
statusEl.style.background='rgba(201,168,118,0.95)';

// Pause any in-progress playback before changing src (prevents AbortError)
try{audio.pause();}catch(e){}

// FIRST: Try pre-generated audio file (instant, no API call, no rate limits)
const staticFile=audioFileMap[loc.name]&&audioFileMap[loc.name][selectedVoice];
console.log('Voice selected:',selectedVoice,'| Location:',loc.name,'| File:',staticFile);
if(staticFile){
// Force reload by clearing src first, then setting new one
audio.src='';
audio.load();
audio.src=staticFile;
audio.load();
// Add error listener to detect file load failures
audio.onerror=function(e){
console.error('Audio file failed to load:',staticFile,e);
statusEl.textContent='❌ File not found: '+staticFile;
statusEl.style.background='rgba(201,83,79,0.95)';
statusEl.style.color='#fff';
};
audio.oncanplay=function(){
console.log('Audio ready:',staticFile);
};
const voiceLabel=selectedVoice==='OldLady'?'👵 Old Lady':'👴 Old Man';
try{
await audio.play();
statusEl.textContent='▶ '+voiceLabel+' - '+loc.name;
statusEl.style.background='rgba(102,187,106,0.95)';
return;
}catch(e){
if(e.name!=='AbortError'){
console.log('Static audio play error:',e);
statusEl.textContent='⚠ '+voiceLabel+' - Click ▶ to play';
statusEl.style.background='rgba(255,165,0,0.95)';
return;
}
}
return;
}

// FALLBACK: API generation (only if no static file exists)
const voiceId=voiceMap[selectedVoice]||voiceMap.OldMan;
try{
const response=await fetch('https://api.elevenlabs.io/v1/text-to-speech/'+voiceId,{
method:'POST',
headers:{'xi-api-key':'sk_e7c4a94f287564d1b658fedd1752af90136987bc3a1c3ad8','Content-Type':'application/json'},
body:JSON.stringify({text:loc.name+' - '+loc.story})
});
if(response.ok){
const blob=await response.blob();
const url=URL.createObjectURL(blob);
audio.src=url;
statusEl.textContent='▶ Playing: '+loc.name;
statusEl.style.background='rgba(102,187,106,0.95)';
try{
await audio.play();
}catch(e){
if(e.name!=='AbortError'){
console.log('Play error:',e);
statusEl.textContent='⚠ Click ▶ on audio player below to play';
statusEl.style.background='rgba(255,165,0,0.95)';
}
}
}else{
console.log('Voice API error:',response.status);
statusEl.textContent='❌ Voice API rate limited - try again later';
statusEl.style.background='rgba(201,83,79,0.95)';
statusEl.style.color='#fff';
}
}catch(e){
console.log('Voice narration error',e);
statusEl.textContent='❌ Network error: '+e.message;
statusEl.style.background='rgba(201,83,79,0.95)';
statusEl.style.color='#fff';
}
}

function renderLocationList(){
const list=document.getElementById('locationList');
list.innerHTML='';
locations.forEach((loc,idx)=>{
const card=document.createElement('div');
card.className='location-card'+(selectedLocation===idx?' active':'');
card.innerHTML='<div class="location-name">'+loc.name+'</div><div class="location-type">'+loc.type+'</div><div class="location-story">'+loc.story+'</div>';
card.onclick=()=>selectLocationByIndex(idx);
list.appendChild(card);
});
}

function centerMap(){
map.setView([32.0730,-81.0900],14);
}

function startGeofencing(){
if(!navigator.geolocation){alert('Geolocation not supported');return;}
geofencingActive=true;
document.querySelector('button:nth-of-type(2)').textContent='📍 Tour Active - GPS On';
navigator.geolocation.watchPosition(position=>{
userLocation={lat:position.coords.latitude,lng:position.coords.longitude};
updateUserMarker();
checkNearbyLocations();
},error=>{
console.error('Geolocation error:',error);
geofencingActive=false;
document.querySelector('button:nth-of-type(2)').textContent='🎬 Start Tour & Accept Location';
});
}

function updateUserMarker(){
if(!userLocation||!map)return;
if(userMarker){
map.removeLayer(userMarker);
}
const userIcon=L.divIcon({className:'user-location-dot',html:'<div></div>',iconSize:[16,16],iconAnchor:[8,8]});
userMarker=L.marker([userLocation.lat,userLocation.lng],{icon:userIcon}).addTo(map);
userMarker.bindTooltip('📍 You are here',{permanent:true,direction:'top',offset:[0,-15],className:'user-location-label'});
}

function checkNearbyLocations(){
if(!userLocation||!geofencingActive)return;
const alert=document.getElementById('proximityAlert');
let nearby=[];
locations.forEach((loc,idx)=>{
const dist=getDistance(userLocation.lat,userLocation.lng,loc.lat,loc.lng);
if(dist<GEOFENCE_RADIUS){
nearby.push({name:loc.name,distance:dist,idx:idx});
}
});
if(nearby.length>0){
nearby.sort((a,b)=>a.distance-b.distance);
const closest=nearby[0];
alert.style.display='block';
alert.innerHTML='👻 '+closest.name+' ('+Math.round(closest.distance)+'m away)<br><small>Tap location to hear story</small>';
if(closest.distance<50&&!userLocation.lastPlayedIdx){
userLocation.lastPlayedIdx=closest.idx;
playNarration(closest.idx);
setTimeout(()=>{delete userLocation.lastPlayedIdx},30000);
}
}else{
alert.style.display='none';
}
}

function getDistance(lat1,lon1,lat2,lon2){
const R=6371;
const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;
const a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
return R*c*1000;
}

function updateStats(){
document.getElementById('totalCount').textContent=locations.length;
const haunted=locations.filter(l=>!l.type.includes('Blessed')).length;
const blessed=locations.filter(l=>l.type.includes('Blessed')).length;
document.getElementById('hauntedCount').textContent=haunted;
document.getElementById('blessedCount').textContent=blessed;
}

function openCoordEditor(idx){
const loc=locations[idx];
currentEditingIndex=idx;
document.getElementById('coordName').value=loc.name;
document.getElementById('coordLat').value=loc.lat;
document.getElementById('coordLng').value=loc.lng;
document.getElementById('coordType').value=loc.type.split(' ')[0];
document.getElementById('coordStory').value=loc.story;
document.getElementById('coordEditor').classList.add('active');
}

function closeCoordEditor(){
document.getElementById('coordEditor').classList.remove('active');
currentEditingIndex=null;
}

function saveCoordinates(){
if(currentEditingIndex===null)return;
const newName=document.getElementById('coordName').value.trim();
const newLat=parseFloat(document.getElementById('coordLat').value);
const newLng=parseFloat(document.getElementById('coordLng').value);
const newType=document.getElementById('coordType').value;
const newStory=document.getElementById('coordStory').value.trim();
if(!newName||isNaN(newLat)||isNaN(newLng)||!newStory){alert('Please fill all fields');return;}
const loc=locations[currentEditingIndex];
loc.name=newName;
loc.lat=newLat;
loc.lng=newLng;
loc.type=newType;
loc.story=newStory;
const marker=markers[currentEditingIndex];
if(marker){
marker.setLatLng([newLat,newLng]);
marker.bindTooltip(newName,{permanent:true,direction:'right',offset:[10,0],className:'location-label'});
}
renderLocationList();
closeCoordEditor();
alert('Location updated!');
}

function deleteLocation(){
if(currentEditingIndex===null)return;
if(!confirm('Delete this location permanently?'))return;
const locName=locations[currentEditingIndex].name;
locations.splice(currentEditingIndex,1);
const marker=markers[currentEditingIndex];
if(marker)map.removeLayer(marker);
markers.splice(currentEditingIndex,1);
currentEditingIndex=null;
saveToStorage();
initMap();
alert(locName+' deleted!');
}

function previewStory(){
const name=document.getElementById('coordName').value.trim();
const story=document.getElementById('coordStory').value.trim();
const voiceSelect=document.getElementById('previewVoice').value;
const voiceId=voiceMap[voiceSelect]||voiceMap.George;
if(!name||!story){
alert('Please enter location name and story first');
return;
}
const btn=event.target;
btn.textContent='⏳ Loading...';
btn.disabled=true;
fetch('https://api.elevenlabs.io/v1/text-to-speech/'+voiceId,{
method:'POST',
headers:{'xi-api-key':'sk_e7c4a94f287564d1b658fedd1752af90136987bc3a1c3ad8','Content-Type':'application/json'},
body:JSON.stringify({text:name+' - '+story})
}).then(response=>{
if(response.ok){
return response.blob();
}else{
alert('Voice API error - check API key');
btn.textContent='▶ Play Preview';
btn.disabled=false;
return null;
}
}).then(blob=>{
if(blob){
const url=URL.createObjectURL(blob);
const audio=new Audio(url);
audio.play();
btn.textContent='▶ Play Preview';
btn.disabled=false;
audio.onended=()=>{
URL.revokeObjectURL(url);
};
}
}).catch(e=>{
console.error('Preview error',e);
alert('Could not load preview - check connection');
btn.textContent='▶ Play Preview';
btn.disabled=false;
});
}

function promptAdminMode(){
const pwd=prompt('Enter admin password:');
if(pwd===null)return;
if(pwd===ADMIN_PASSWORD){
adminMode=true;
updateAdminUI();
alert('Admin mode unlocked!');
}else{
alert('Incorrect password');
}
}

function toggleAdminMode(){
adminMode=false;
updateAdminUI();
alert('Admin mode locked');
}

function updateAdminUI(){
const badge=document.getElementById('adminBadge');
const adminBtn=document.getElementById('adminButton');
const editBtn1=document.getElementById('editButton1');
const editBtn2=document.getElementById('editButton2');
if(adminMode){
badge.style.display='block';
adminBtn.style.display='none';
editBtn1.style.display='block';
editBtn2.style.display='block';
}else{
badge.style.display='none';
adminBtn.style.display='block';
editBtn1.style.display='none';
editBtn2.style.display='none';
}
}

function addNewLocation(){
const newLat=parseFloat(prompt('Enter latitude (e.g., 32.0730):'));
const newLng=parseFloat(prompt('Enter longitude (e.g., -81.0900):'));
if(isNaN(newLat)||isNaN(newLng)){alert('Invalid coordinates');return;}
const newName=prompt('Enter location name:');
if(!newName){return;}
const newType=prompt('Enter type (Haunted, Blessed, Historic, Church, etc.):','Haunted');
const newStory=prompt('Enter story/description:','');
if(!newStory){alert('Story cannot be empty');return;}
locations.push({name:newName,lat:newLat,lng:newLng,type:newType,story:newStory});
saveToStorage();
initMap();
alert(newName+' added! Total locations: '+locations.length);
}

function saveToStorage(){
localStorage.setItem('savannahGhostTourLocations',JSON.stringify(locations));
}

function loadFromStorage(){
const saved=localStorage.getItem('savannahGhostTourLocations');
if(saved){
try{
locations=JSON.parse(saved);
}catch(e){
console.error('Error loading saved locations',e);
}
}
}

function exportLocations(){
const exportData='// Savannah Ghost Tour - Location Data\n// Updated: '+new Date().toLocaleString()+'\n// Total Locations: '+locations.length+'\n\nconst locations=['+locations.map(l=>'{\n  name:"'+l.name.replace(/"/g,'\\"')+'",\n  lat:'+l.lat+',\n  lng:'+l.lng+',\n  type:"'+l.type.replace(/"/g,'\\"')+'",\n  story:"'+l.story.replace(/"/g,'\\"').replace(/\n/g,'\\n')+'"\n}').join(',\n')+'\n];\n';
const blob=new Blob([exportData],{type:'text/plain'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');
a.href=url;
a.download='savannah-locations-'+new Date().toISOString().split('T')[0]+'.txt';
a.click();
URL.revokeObjectURL(url);
alert('Locations exported! File downloaded.');
}

window.addEventListener('load',()=>{
loadFromStorage();
updateAdminUI();
initMap();
});
</script>
