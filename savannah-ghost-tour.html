<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Savannah Remembers — Walking Memory Experience</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Georgia', serif;
  background: #0a0805;
  color: #e9dcc6;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

.memory-container {
  display: flex;
  height: 100vh;
  background: #0a0805;
}

#map {
  flex: 1;
  background: #1a1410;
  z-index: 1;
}

.story-panel {
  width: 100%;
  max-width: 480px;
  background: linear-gradient(180deg, #1a1410 0%, #0d0a08 100%);
  border-left: 1px solid rgba(233, 220, 198, 0.1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: -8px 0 24px rgba(0, 0, 0, 0.7);
}

.story-header {
  background: rgba(10, 8, 6, 0.95);
  border-bottom: 1px solid rgba(233, 220, 198, 0.15);
  padding: 24px 20px;
  text-align: center;
  backdrop-filter: blur(10px);
}

.story-header h1 {
  font-size: 22px;
  color: #e7c389;
  margin-bottom: 4px;
  font-weight: 400;
  letter-spacing: 0.5px;
}

.story-header p {
  font-size: 11px;
  color: #8b7d60;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.story-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.story-content::-webkit-scrollbar {
  width: 6px;
}

.story-content::-webkit-scrollbar-track {
  background: transparent;
}

.story-content::-webkit-scrollbar-thumb {
  background: rgba(233, 220, 198, 0.2);
  border-radius: 3px;
}

.stop-card {
  background: rgba(42, 37, 32, 0.5);
  border: 1px solid rgba(233, 220, 198, 0.1);
  border-radius: 8px;
  padding: 16px;
  animation: fadeIn 0.6s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.stop-number {
  font-size: 10px;
  color: #8b7d60;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.stop-name {
  font-size: 18px;
  color: #e7c389;
  font-weight: 400;
  margin-bottom: 12px;
  line-height: 1.3;
}

.truth-badge {
  display: inline-block;
  font-size: 9px;
  padding: 4px 10px;
  border-radius: 12px;
  margin-bottom: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 600;
}

.truth-fact {
  background: rgba(76, 175, 80, 0.2);
  color: #66bb6a;
  border: 1px solid rgba(102, 187, 106, 0.3);
}

.truth-legend {
  background: rgba(201, 168, 118, 0.2);
  color: #e8c96a;
  border: 1px solid rgba(232, 201, 106, 0.3);
}

.truth-theatrical {
  background: rgba(156, 39, 176, 0.2);
  color: #ce93d8;
  border: 1px solid rgba(206, 147, 216, 0.3);
}

.narrator-section {
  margin-bottom: 12px;
}

.narrator-label {
  font-size: 10px;
  color: #8b7d60;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 8px;
  display: block;
}

.narrator-text {
  font-size: 14px;
  color: #d4c5b9;
  line-height: 1.7;
  font-style: italic;
  padding: 12px;
  background: rgba(0, 0, 0, 0.3);
  border-left: 2px solid rgba(232, 201, 106, 0.4);
  border-radius: 4px;
}

.spirit-section {
  background: rgba(156, 39, 176, 0.1);
  padding: 12px;
  border-radius: 6px;
  border-left: 3px solid rgba(206, 147, 216, 0.5);
  margin: 12px 0;
}

.spirit-label {
  font-size: 9px;
  color: #ce93d8;
  letter-spacing: 1px;
  text-transform: uppercase;
  display: block;
  margin-bottom: 6px;
}

.spirit-name {
  font-size: 12px;
  color: #ce93d8;
  font-weight: 600;
  margin-bottom: 8px;
}

.spirit-monologue {
  font-size: 13px;
  color: #d4c5b9;
  line-height: 1.6;
  font-style: italic;
}

.memory-significance {
  border-top: 1px solid rgba(233, 220, 198, 0.1);
  padding-top: 12px;
  margin-top: 12px;
  font-size: 12px;
  color: #a89968;
  line-height: 1.6;
  font-style: italic;
}

.arc-indicator {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 10px;
  color: #8b7d60;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid rgba(233, 220, 198, 0.08);
}

.arc-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(232, 201, 106, 0.6);
}

.walking-info {
  background: rgba(33, 150, 243, 0.1);
  border: 1px solid rgba(33, 150, 243, 0.3);
  padding: 12px;
  border-radius: 6px;
  margin-top: 12px;
}

.walking-time {
  font-size: 12px;
  color: #64b5f6;
  margin-bottom: 6px;
  display: block;
}

.walking-direction {
  font-size: 11px;
  color: #9fd8a6;
  line-height: 1.5;
}

.nav-controls {
  display: flex;
  gap: 10px;
  padding: 16px 20px;
  background: rgba(10, 8, 6, 0.95);
  border-top: 1px solid rgba(233, 220, 198, 0.1);
  backdrop-filter: blur(10px);
}

.nav-btn {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: all 0.3s;
}

.nav-btn-prev {
  background: rgba(139, 115, 85, 0.3);
  color: #a89968;
  border: 1px solid rgba(139, 115, 85, 0.5);
}

.nav-btn-prev:hover {
  background: rgba(139, 115, 85, 0.4);
}

.nav-btn-next {
  background: linear-gradient(135deg, rgba(102, 187, 106, 0.3), rgba(76, 175, 80, 0.2));
  color: #66bb6a;
  border: 1px solid rgba(102, 187, 106, 0.5);
}

.nav-btn-next:hover {
  background: linear-gradient(135deg, rgba(102, 187, 106, 0.4), rgba(76, 175, 80, 0.3));
}

.nav-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.progress-bar {
  width: 100%;
  height: 3px;
  background: rgba(233, 220, 198, 0.1);
  margin-bottom: 10px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #66bb6a, #e8c96a);
  transition: width 0.4s ease;
}

@media (max-width: 1024px) {
  .memory-container {
    flex-direction: column;
  }

  #map {
    height: 40%;
    order: 2;
  }

  .story-panel {
    height: 60%;
    max-width: 100%;
    border-left: none;
    border-top: 1px solid rgba(233, 220, 198, 0.1);
    order: 1;
  }

  .story-header {
    padding: 16px;
  }

  .story-header h1 {
    font-size: 18px;
  }

  .story-content {
    padding: 16px;
  }
}

audio {
  display: none;
}

.stop-marker {
  opacity: 0.6;
  transition: all 0.3s;
}

.stop-marker.active {
  opacity: 1;
  filter: drop-shadow(0 0 8px rgba(232, 201, 106, 0.8));
}

.stop-marker.blessed .marker-dot {
  background: #66bb6a;
  box-shadow: 0 0 10px rgba(102, 187, 106, 0.6);
}

.stop-marker.haunted .marker-dot {
  background: #e8c96a;
  box-shadow: 0 0 10px rgba(232, 201, 106, 0.6);
}

.marker-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 2px solid #fff;
  box-sizing: border-box;
}

.proximity-alert {
  display: none;
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 998;
  background: rgba(102, 187, 106, 0.95);
  color: #fff;
  padding: 12px 20px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
  animation: slideUp 0.4s ease;
}

.proximity-alert.show {
  display: block;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
</style>
</head>
<body>

<div class="memory-container">
  <div id="map"></div>

  <div class="story-panel">
    <div class="story-header">
      <h1>Savannah Remembers</h1>
      <p>Walking Memory Experience</p>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="story-content" id="storyContent">
      <p style="color: #8b7d60; text-align: center; padding: 40px 20px;">
        Loading experience...
      </p>
    </div>

    <div class="nav-controls">
      <button class="nav-btn nav-btn-prev" id="prevBtn" onclick="previousStop()">← Previous</button>
      <button class="nav-btn nav-btn-next" id="nextBtn" onclick="nextStop()">Next →</button>
    </div>
  </div>
</div>

<div class="proximity-alert" id="proximityAlert"></div>
<audio id="narrationAudio"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
// ============================================================================
// SAVANNAH REMEMBERS — GHOST TOUR DATA STRUCTURE (12-PHASE EMOTIONAL ARC)
// ============================================================================

const TOUR_DATA = {
  title: "Savannah Remembers",
  description: "A walking journey through Savannah's deepest memories",

  stops: [
    {
      id: 0,
      name: "The Wilder House — Sanctuary Opening",
      location: "314 East Park Avenue, Victorian District",
      lat: 32.063892,
      lng: -81.093253,
      type: "Blessed",
      arcPhase: 0,
      arcLabel: "Threshold — Sacred Ground",
      walkingTimeToNext: "4:00 min",
      truthType: "theatrical",
      narrator: {
        voice: "OldMan",
        text: "Welcome to the Wilder House. Before we step into Savannah's memory tonight, understand: you are standing in a protected place. Reverend Wilder blessed these walls long ago, and that blessing still holds. Nothing we encounter tonight will follow you back here. This house is your sanctuary. Breathe easy. When you're ready, we'll walk west along Park Avenue — just five minutes — and begin where Savannah starts to open its memory to us."
      },
      memorSignificance: "Every memory begins in a safe place. Before we walk into sorrow, strength, violence, and loss, we are reminded: there is sanctuary. There is shelter. Savannah's hauntings cannot touch us here."
    },

    {
      id: 1,
      name: "STOP 1: Telfair Hospital",
      location: "121 W. 8th Street, Historic District",
      lat: 32.064674,
      lng: -81.096386,
      type: "Haunted",
      arcPhase: 1,
      arcLabel: "Strength — Iron Will",
      walkingTimeToNext: "1:45 min",
      truthType: "fact",
      narrator: {
        voice: "OldLady",
        text: "Our journey begins with a memory of will — strong and unyielding. Mary Telfair built this hospital as a sanctuary for women only. No men allowed. That was her unbreakable rule. When she died, she chose to stay. She still walks these halls — a tall figure in a long brown dress. Her lavender perfume appears without warning. Doors close with quiet purpose. Some men still feel her presence gently but firmly reminding them: this space has its boundaries. Even now, Mary protects what she built."
      },
      spirit: {
        name: "Mary Telfair",
        timeperiod: "1779–1875",
        monologue: "I built this place for women who had nowhere else to turn. My rule was absolute: no men. Not because of hatred, but because some boundaries, once established, must hold. I protected them in life. I protect this space in death. That does not change."
      },
      memorSignificance: "Strength in Savannah is often female. It is quiet. It is unwavering. It protects what it loves."
    },

    {
      id: 2,
      name: "STOP 2: Spanish War Veteran Statue",
      location: "Forsyth Park, near south entrance",
      lat: 32.064950,
      lng: -81.097180,
      type: "Historic",
      arcPhase: 2,
      arcLabel: "Vigilance — The Watcher",
      walkingTimeToNext: "1:20 min",
      truthType: "fact",
      narrator: {
        voice: "OldMan",
        text: "A soldier stands here, bronze and eternal, watching over Forsyth Park. He was sent to fight in a foreign war — Spain, the Caribbean, lands that had nothing to do with Savannah. But he came home. He came home changed. And now he stands, forever looking over this park, forever keeping watch. Some soldiers never truly leave their post. Some continue their duty long after their bodies have returned to the earth."
      },
      spirit: {
        name: "The Spanish War Veteran",
        monologue: "They sent us to fight for glory. We fought for survival. Now I stand here, watching the park I knew as a boy. Nothing rests when you've seen what we've seen. The watch continues. That's all we know."
      },
      memorSignificance: "Savannah sent her sons to fight in distant wars. Some returned as ghosts long before their bodies died."
    },

    {
      id: 3,
      name: "STOP 3: Live Oak Grove — Moss and Memory",
      location: "Forsyth Park, central oaks",
      lat: 32.065800,
      lng: -81.095500,
      type: "Haunted",
      arcPhase: 3,
      arcLabel: "Atmosphere — The Watching Trees",
      walkingTimeToNext: "2:13 min",
      truthType: "theatrical",
      narrator: {
        voice: "OldLady",
        text: "You are now under the oldest living things in Savannah. These live oaks have been here for three hundred years. Longer than any building. Longer than any person who has walked beneath them. The moss hangs like memories — draped, heavy, gray. The trees remember everything. Every secret shared in their shade. Every sorrow hidden beneath their canopy. Every love that bloomed and died here. The homes around us are beautiful, but beauty here is always watching. Always listening. Always remembering."
      },
      memorSignificance: "Nature remembers longer than we do. The trees and moss bear witness to all of Savannah's secrets."
    },

    {
      id: 4,
      name: "STOP 4: Francois Benton & Confederate Monument",
      location: "Chippewa Square area",
      lat: 32.074100,
      lng: -81.093800,
      type: "Monument",
      arcPhase: 4,
      arcLabel: "History — The Unresolved",
      walkingTimeToNext: "3:45 min",
      truthType: "fact",
      narrator: {
        voice: "OldMan",
        text: "This square holds two men in stone. Francois Benton, who loved Savannah. And a towering monument to Confederate dead — men who died for a cause that was already dying. These monuments stand as Savannah stands: containing contradictions. Beauty built on injustice. Honor tangled with grief. The city does not erase these contradictions. It holds them. It remembers them. Some of those who died here still cannot rest. They linger in the shadow of stone."
      },
      memorSignificance: "Savannah's monuments contain unresolved history. The city remembers not just triumph, but failure and moral wound."
    },

    {
      id: 5,
      name: "STOP 5: Forsyth Fountain — Beauty and Sorrow",
      location: "Forsyth Park, central fountain",
      lat: 32.06922,
      lng: -81.095635,
      type: "Haunted",
      arcPhase: 5,
      arcLabel: "Tragedy — Hidden Beneath Beauty",
      walkingTimeToNext: "3:45 min",
      geofenceRadius: 150,
      truthType: "legend",
      narrator: {
        voice: "OldLady",
        text: "Here, strength gives way to sorrow. This fountain is one of Savannah's most beloved images — graceful, iconic, beautiful. But beauty in this city often holds deeper truths beneath its surface. A fourteen-year-old girl named Lottie once lived with a terrible secret. In confusion and desperation, she poisoned a woman she believed was her rival — only to discover it was her own mother. The truth shattered her completely. She never recovered. Her spirit returned to this fountain — the most beautiful place she knew. People still see a young girl near the water. Sometimes peaceful. Sometimes overwhelmed with regret. Many feel waves of sadness and guilt pass through them without warning."
      },
      spirit: {
        name: "Lottie",
        monologue: "I didn't know. I didn't know until it was too late. She was my mother. This fountain is beautiful. But beautiful things can hide the worst of us. I'm sorry. I'm so sorry."
      },
      memorSignificance: "Beauty in Savannah often conceals tragedy. The fountain reminds us: the most beautiful places sometimes hold the heaviest pain."
    },

    {
      id: 6,
      name: "STOP 6: Kessler Mansion — Old Armstrong College",
      location: "429 Bull Street, Historic District",
      lat: 32.075900,
      lng: -81.093600,
      type: "Historic",
      arcPhase: 6,
      arcLabel: "Legacy — Echoes of Institution",
      walkingTimeToNext: "1:30 min",
      truthType: "fact",
      narrator: {
        voice: "OldMan",
        text: "This mansion once housed Armstrong College — a place of learning and aspiration. The walls remember students who studied here, who dreamed of futures beyond these rooms. Some of those dreams were realized. Many were not. The building stands now as a reminder of the transience of institutions. What seemed permanent is now memory. What bustled with life is now quiet. Yet the spirits of ambition still linger here — the echoes of young people who believed their education would change their lives."
      },
      memorSignificance: "Savannah's institutions have always shaped the dreams of its young people. When those institutions fall, the dreams don't always die — they haunt the spaces they left behind."
    },

    {
      id: 7,
      name: "STOP 7: Pulaski Square & Monument",
      location: "Pulaski Square, Historic District",
      lat: 32.077388,
      lng: -81.09005,
      type: "Monument",
      arcPhase: 7,
      arcLabel: "Honor — The Peaceful Rest",
      walkingTimeToNext: "1:50 min",
      truthType: "fact",
      narrator: {
        voice: "OldLady",
        text: "Casimir Pulaski was mortally wounded nearby in 1779 — the Revolutionary War's end, perhaps, for Savannah. His remains rest beneath this monument. Unlike so many others we have encountered tonight, Pulaski has found peace. Colonial soldiers sometimes appear around this square at dusk, standing at attention, saluting their commander with quiet loyalty. Not every memory in Savannah remains broken. Some have earned rest. Some have found forgiveness. Some have learned that honor, finally, is enough."
      },
      memorSignificance: "Not all of Savannah's ghosts are restless. Some have earned peace through service and sacrifice. This square teaches us: some memories, in the end, find rest."
    },

    {
      id: 8,
      name: "STOP 8: Jones & Bull Street Corner",
      location: "Corner of Jones & Bull Street",
      lat: 32.077800,
      lng: -81.093400,
      type: "Historic",
      arcPhase: 8,
      arcLabel: "Intersection — Where Paths Cross",
      walkingTimeToNext: "1:30 min",
      truthType: "theatrical",
      narrator: {
        voice: "OldMan",
        text: "This corner is an intersection — a place where people have crossed paths for two centuries. Merchants and enslaved people. Soldiers and civilians. The wealthy and the desperate. All have stood here. All have been changed by this moment of crossing. Intersections are liminal spaces. They belong to no one. They hold the energy of countless meetings, partings, and collisions. Some people return to the places where their lives changed forever. This corner holds many such returns."
      },
      memorSignificance: "Intersections are sacred in cities. They are where destinies collide. Savannah's corners remember every crossing."
    },

    {
      id: 9,
      name: "STOP 9: Madison Square — Convergence",
      location: "Madison Square, Historic District",
      lat: 32.076800,
      lng: -81.092400,
      type: "Blessed",
      arcPhase: 9,
      arcLabel: "Convergence — Many Voices",
      walkingTimeToNext: "2:40 min",
      truthType: "fact",
      narrator: {
        voice: "OldLady",
        text: "Madison Square holds three voices. The church stands as sanctuary — a place where people have always sought safety and prayer. The Sorrel Weed House holds the memory of bondage and survival. The Green-Meldrim House holds the memory of occupation and resistance. All three stand here together, in one square, containing Savannah's contradictions. The church does not erase the history of the houses around it. The houses do not negate the sanctity of the church. They exist together. They remember together. And in this convergence, we understand: Savannah's memory is not simple. It is layered. It is tragic and sacred at once. The city holds all of it."

      memorSignificance: "Madison Square is where Savannah's different histories come together. The city's memory becomes whole here — not resolved, but integrated."
    },

    {
      id: 10,
      name: "STOP 10: Chippewa Square — Unresolution",
      location: "Chippewa Square, Historic District",
      lat: 32.075843,
      lng: -81.093124,
      type: "Haunted",
      arcPhase: 10,
      arcLabel: "Unresolution — The Continuing Story",
      walkingTimeToNext: "2:30 min walk to river",
      truthType: "legend",
      narrator: {
        voice: "OldMan",
        text: "Chippewa Square holds a memory that will not rest. Inside the Foley House Inn, workers discovered a human skeleton sealed inside a wall in 1987. A man had entered Honoria Foley's room with harm in his heart. She defended herself. Rather than face the truth, they sealed his body inside the wall. They call him Wally. Guests still see him — a figure in 19th-century clothes who vanishes when looked at directly. Across the square, actress Betty still watches performances at the Savannah Theatre. She loved the stage so deeply she could never truly leave. Some wounds in Savannah refuse to close. Some stories refuse to end."

      spirit: {
        name: "Wally",
        monologue: "They sealed me inside. I don't understand. I don't understand what happened. I'm still here. I don't know how to leave. Why can't anyone see me? Why can't anyone help me?"

      memorSignificance: "Some of Savannah's memories have never found resolution. They continue. They insist on being remembered. Some ghosts cannot rest because their stories were never truly told."
    },

    {
      id: 11,
      name: "EPILOGUE: Savannah River — Release",
      location: "Emmet Park, River edge",
      lat: 32.080375,
      lng: -81.088972,
      type: "Threshold",
      arcPhase: 11,
      arcLabel: "Release — The River Remembers",
      walkingTimeToNext: null,
      truthType: "fact",
      narrator: {
        voice: "OldLady",
        text: "And now we have reached the place where all the layers become one. For nearly three hundred years, this river carried Savannah's deepest wound — the arrival and suffering of countless enslaved Africans. Tens of thousands passed through these docks in chains. At twilight, many hear voices rising from the water — fragments of African languages and Gullah carried on the breeze. Not in rage. But quietly insisting: Remember us. The river does not separate the stories we walked through tonight. It holds them all. Mary's iron will. Lottie's sorrow. The soldiers' vigilance. The city's unresolved contradictions. You have walked through the living memory of Savannah tonight. And now that memory walks with you. Carry these stories gently. Speak them when you can. That is all the city asks."
      },
      memorSignificance: "The river is Savannah's deepest memory. It holds all the voices — the protected and the enslaved, the remembered and the forgotten. The river does not end the tour. It continues it. The memory continues."
    }
  ]
};

// ============================================================================
// APPLICATION STATE
// ============================================================================

let map;
let currentStopIndex = 0;
let userLocation = null;
let markers = [];
let routePolyline = null;

// ============================================================================
// INITIALIZATION
// ============================================================================

function initApp() {
  initMap();
  renderCurrentStop();
  startLocationTracking();
}

function initMap() {
  map = L.map('map').setView([32.0730, -81.0900], 14);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OSM &copy; CARTO',
    maxZoom: 19
  }).addTo(map);
  map.attributionControl.setPrefix(false);

  // Create markers for all stops
  TOUR_DATA.stops.forEach((stop, idx) => {
    const isBlessed = stop.type === 'Blessed';
    const iconClass = isBlessed ? 'blessed' : 'haunted';

    const icon = L.divIcon({
      className: `stop-marker ${iconClass}`,
      html: `<div class="marker-dot"></div>`,
      iconSize: [18, 18],
      iconAnchor: [9, 9]
    });

    const marker = L.marker([stop.lat, stop.lng], { icon })
      .addTo(map)
      .bindTooltip(stop.name, {
        permanent: false,
        direction: 'top',
        offset: [0, -10]
      });

    marker.on('click', () => jumpToStop(idx));
    markers.push(marker);
  });

  // Draw route
  const routeCoords = TOUR_DATA.stops.map(stop => [stop.lat, stop.lng]);
  routePolyline = L.polyline(routeCoords, {
    color: '#c9a876',
    weight: 2,
    opacity: 0.3,
    dashArray: '5,5'
  }).addTo(map);
}

// ============================================================================
// STOP RENDERING
// ============================================================================

function renderCurrentStop() {
  const stop = TOUR_DATA.stops[currentStopIndex];
  const container = document.getElementById('storyContent');

  // Update progress
  const progress = ((currentStopIndex + 1) / TOUR_DATA.stops.length) * 100;
  document.getElementById('progressFill').style.width = progress + '%';

  // Build HTML
  let html = `<div class="stop-card">`;

  // Stop number & name
  html += `<div class="stop-number">Stop ${stop.id + 1} of ${TOUR_DATA.stops.length}</div>`;
  html += `<div class="stop-name">${stop.name}</div>`;

  // Truth badge
  const truthBadgeClass = `truth-${stop.truthType}`;
  const truthLabel = stop.truthType.charAt(0).toUpperCase() + stop.truthType.slice(1);
  html += `<span class="truth-badge ${truthBadgeClass}">${truthLabel}</span>`;

  // Emotional arc indicator
  html += `<div class="arc-indicator">
    <span class="arc-dot"></span>
    <span>${stop.arcLabel}</span>
  </div>`;

  // Narrator section
  html += `<div class="narrator-section">
    <label class="narrator-label">🎙️ Narration</label>
    <div class="narrator-text">${stop.narrator.text}</div>
  </div>`;

  // Spirit section (if exists)
  if (stop.spirit) {
    html += `<div class="spirit-section">
      <label class="spirit-label">👤 ${stop.spirit.name.toUpperCase()}</label>
      <div class="spirit-monologue">"${stop.spirit.monologue}"</div>
    </div>`;
  }

  // Memory significance
  html += `<div class="memory-significance">
    <strong>Savannah's Memory:</strong> ${stop.memorSignificance}
  </div>`;

  // Walking info
  if (stop.walkingTimeToNext) {
    html += `<div class="walking-info">
      <span class="walking-time">⏱️ ${stop.walkingTimeToNext}</span>
      <span class="walking-direction">Walk to the next stop when ready</span>
    </div>`;
  } else {
    html += `<div class="walking-info" style="background: rgba(102, 187, 106, 0.15); border-color: rgba(102, 187, 106, 0.4);">
      <span class="walking-time" style="color: #66bb6a;">✓ Final Stop — The River's Memory</span>
      <span class="walking-direction">You have reached the threshold. Take time to reflect.</span>
    </div>`;
  }

  html += `</div>`;

  container.innerHTML = html;

  // Update button states
  document.getElementById('prevBtn').disabled = currentStopIndex === 0;
  document.getElementById('nextBtn').disabled = currentStopIndex === TOUR_DATA.stops.length - 1;

  // Center map on current stop
  map.setView([stop.lat, stop.lng], 15);

  // Highlight current marker
  markers.forEach((marker, idx) => {
    marker.setIcon(L.divIcon({
      className: `stop-marker ${TOUR_DATA.stops[idx].type === 'Blessed' ? 'blessed' : 'haunted'} ${idx === currentStopIndex ? 'active' : ''}`,
      html: `<div class="marker-dot"></div>`,
      iconSize: [18, 18],
      iconAnchor: [9, 9]
    }));
  });
}

function nextStop() {
  if (currentStopIndex < TOUR_DATA.stops.length - 1) {
    currentStopIndex++;
    renderCurrentStop();
  }
}

function previousStop() {
  if (currentStopIndex > 0) {
    currentStopIndex--;
    renderCurrentStop();
  }
}

function jumpToStop(idx) {
  currentStopIndex = idx;
  renderCurrentStop();
}

// ============================================================================
// LOCATION TRACKING (STUB FOR EXPANSION)
// ============================================================================

function startLocationTracking() {
  if ('geolocation' in navigator) {
    navigator.geolocation.watchPosition(
      (position) => {
        userLocation = {
          lat: position.coords.latitude,
          lng: position.coords.longitude
        };
      },
      (error) => {
        console.log('Location tracking available for expansion');
      }
    );
  }
}

// ============================================================================
// STARTUP
// ============================================================================

document.addEventListener('DOMContentLoaded', initApp);
</script>
