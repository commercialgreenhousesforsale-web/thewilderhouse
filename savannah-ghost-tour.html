<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Savannah Remembers — GPS Walking Memory Experience</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Georgia', serif;
  background: #0a0805;
  color: #e9dcc6;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

.memory-container {
  display: flex;
  height: 100vh;
  background: #0a0805;
}

#map {
  flex: 1;
  background: #1a1410;
  z-index: 1;
}

.story-panel {
  width: 100%;
  max-width: 480px;
  background: linear-gradient(180deg, #1a1410 0%, #0d0a08 100%);
  border-left: 1px solid rgba(233, 220, 198, 0.1);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  box-shadow: -8px 0 24px rgba(0, 0, 0, 0.7);
}

.story-header {
  background: rgba(10, 8, 6, 0.95);
  border-bottom: 1px solid rgba(233, 220, 198, 0.15);
  padding: 24px 20px;
  text-align: center;
  backdrop-filter: blur(10px);
}

.story-header h1 {
  font-size: 22px;
  color: #e7c389;
  margin-bottom: 4px;
  font-weight: 400;
  letter-spacing: 0.5px;
}

.story-header p {
  font-size: 11px;
  color: #8b7d60;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.gps-status {
  font-size: 9px;
  color: #66bb6a;
  margin-top: 8px;
  padding: 6px 10px;
  background: rgba(102, 187, 106, 0.1);
  border-radius: 3px;
  display: inline-block;
}

.story-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.story-content::-webkit-scrollbar {
  width: 6px;
}

.story-content::-webkit-scrollbar-track {
  background: transparent;
}

.story-content::-webkit-scrollbar-thumb {
  background: rgba(233, 220, 198, 0.2);
  border-radius: 3px;
}

.stop-card {
  background: rgba(42, 37, 32, 0.5);
  border: 1px solid rgba(233, 220, 198, 0.1);
  border-radius: 8px;
  padding: 16px;
  animation: fadeIn 0.6s ease-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.stop-header {
  margin-bottom: 12px;
}

.stop-number {
  font-size: 10px;
  color: #8b7d60;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.stop-name {
  font-size: 18px;
  color: #e7c389;
  font-weight: 400;
  margin-bottom: 8px;
  line-height: 1.3;
}

.arrival-state {
  display: inline-block;
  font-size: 9px;
  padding: 4px 10px;
  border-radius: 12px;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-weight: 600;
  margin-right: 8px;
}

.arrival-early {
  background: rgba(33, 150, 243, 0.2);
  color: #64b5f6;
  border: 1px solid rgba(33, 150, 243, 0.3);
}

.arrival-ontime {
  background: rgba(102, 187, 106, 0.2);
  color: #66bb6a;
  border: 1px solid rgba(102, 187, 106, 0.3);
}

.arrival-late {
  background: rgba(255, 193, 7, 0.2);
  color: #ffa726;
  border: 1px solid rgba(255, 193, 7, 0.3);
}

.arrival-manual {
  background: rgba(156, 39, 176, 0.2);
  color: #ce93d8;
  border: 1px solid rgba(206, 147, 216, 0.3);
}

.truth-badge {
  display: inline-block;
  font-size: 8px;
  padding: 3px 8px;
  border-radius: 10px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  font-weight: 600;
}

.truth-fact {
  background: rgba(76, 175, 80, 0.2);
  color: #66bb6a;
  border: 1px solid rgba(102, 187, 106, 0.3);
}

.truth-legend {
  background: rgba(201, 168, 118, 0.2);
  color: #e8c96a;
  border: 1px solid rgba(232, 201, 106, 0.3);
}

.truth-theatrical {
  background: rgba(156, 39, 176, 0.2);
  color: #ce93d8;
  border: 1px solid rgba(206, 147, 216, 0.3);
}

.narration-text {
  font-size: 14px;
  color: #d4c5b9;
  line-height: 1.8;
  padding: 12px;
  background: rgba(0, 0, 0, 0.3);
  border-left: 2px solid rgba(232, 201, 106, 0.4);
  border-radius: 4px;
  white-space: pre-wrap;
  font-family: 'Georgia', serif;
}

.audio-player {
  background: rgba(102, 187, 106, 0.1);
  border: 1px solid rgba(102, 187, 106, 0.3);
  border-radius: 6px;
  padding: 12px;
  margin-top: 12px;
}

.audio-controls {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.play-btn {
  flex: 0 0 auto;
  width: 40px;
  height: 40px;
  background: rgba(102, 187, 106, 0.2);
  border: 1px solid rgba(102, 187, 106, 0.4);
  color: #66bb6a;
  border-radius: 4px;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}

.play-btn:hover {
  background: rgba(102, 187, 106, 0.3);
}

.play-btn.playing {
  background: rgba(102, 187, 106, 0.3);
  color: #66bb6a;
}

.audio-progress {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.progress-track {
  width: 100%;
  height: 4px;
  background: rgba(102, 187, 106, 0.2);
  border-radius: 2px;
  cursor: pointer;
  position: relative;
}

.progress-fill {
  height: 100%;
  background: #66bb6a;
  border-radius: 2px;
  width: 0%;
  transition: width 0.1s linear;
}

.audio-time {
  font-size: 10px;
  color: #9fd8a6;
  display: flex;
  justify-content: space-between;
}

.walking-info {
  background: rgba(33, 150, 243, 0.1);
  border: 1px solid rgba(33, 150, 243, 0.3);
  padding: 12px;
  border-radius: 6px;
  margin-top: 12px;
  font-size: 11px;
  color: #9fd8a6;
}

.nav-controls {
  display: flex;
  gap: 10px;
  padding: 16px 20px;
  background: rgba(10, 8, 6, 0.95);
  border-top: 1px solid rgba(233, 220, 198, 0.1);
  backdrop-filter: blur(10px);
}

.nav-btn {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  transition: all 0.3s;
}

.nav-btn-prev {
  background: rgba(139, 115, 85, 0.3);
  color: #a89968;
  border: 1px solid rgba(139, 115, 85, 0.5);
}

.nav-btn-prev:hover {
  background: rgba(139, 115, 85, 0.4);
}

.nav-btn-next {
  background: linear-gradient(135deg, rgba(102, 187, 106, 0.3), rgba(76, 175, 80, 0.2));
  color: #66bb6a;
  border: 1px solid rgba(102, 187, 106, 0.5);
}

.nav-btn-next:hover {
  background: linear-gradient(135deg, rgba(102, 187, 106, 0.4), rgba(76, 175, 80, 0.3));
}

.nav-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

.progress-bar {
  width: 100%;
  height: 3px;
  background: rgba(233, 220, 198, 0.1);
  margin-bottom: 10px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #66bb6a, #e8c96a);
  transition: width 0.4s ease;
}

@media (max-width: 1024px) {
  .memory-container {
    flex-direction: column;
  }

  #map {
    height: 40%;
    order: 2;
  }

  .story-panel {
    height: 60%;
    max-width: 100%;
    border-left: none;
    border-top: 1px solid rgba(233, 220, 198, 0.1);
    order: 1;
  }

  .story-header {
    padding: 16px;
  }

  .story-header h1 {
    font-size: 18px;
  }

  .story-content {
    padding: 16px;
  }
}

audio {
  display: none;
}

.stop-marker {
  opacity: 0.6;
  transition: all 0.3s;
}

.stop-marker.active {
  opacity: 1;
  filter: drop-shadow(0 0 8px rgba(232, 201, 106, 0.8));
}

.marker-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  border: 2px solid #fff;
  background: #e8c96a;
  box-sizing: border-box;
  box-shadow: 0 0 10px rgba(232, 201, 106, 0.6);
}

.proximity-alert {
  display: none;
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 998;
  background: rgba(102, 187, 106, 0.95);
  color: #fff;
  padding: 12px 20px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.6);
}

.proximity-alert.show {
  display: block;
  animation: slideUp 0.4s ease;
}

@keyframes slideUp {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}
</style>
</head>
<body>

<div class="memory-container">
  <div id="map"></div>

  <div class="story-panel">
    <div class="story-header">
      <h1>Savannah Remembers</h1>
      <p>GPS-Triggered Walking Memory Experience</p>
      <div class="gps-status" id="gpsStatus">📍 GPS Ready</div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="story-content" id="storyContent">
      <p style="color: #8b7d60; text-align: center; padding: 40px 20px;">
        Loading experience...
      </p>
    </div>

    <div class="nav-controls">
      <button class="nav-btn nav-btn-prev" id="prevBtn" onclick="previousStop()">← Previous</button>
      <button class="nav-btn nav-btn-next" id="nextBtn" onclick="nextStop()">Next →</button>
    </div>
  </div>
</div>

<div class="proximity-alert" id="proximityAlert"></div>
<audio id="narrationAudio"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
// ============================================================================
// SAVANNAH REMEMBERS — 8-STOP GPS-TRIGGERED TOUR WITH ARRIVAL MODES
// ============================================================================

const TOUR_DATA = {

    {

      truth_type: "theatrical",
      theme: "Atmosphere — The Watching Trees",
      ambient_audio: "/audio/ambient-oak-grove-wind-moss.mp3",

      early_arrival: {
        text: "You're standing under the oldest living things in Savannah. Feel the age. Wait here a moment.",
        duration_sec: 12

        text: "You are now under the oldest living things in Savannah. These live oaks have been here for three hundred years. [pause 2s] Longer than any building. Longer than any person who has walked beneath them. The moss hangs like memories — draped. Heavy. Gray. [pause 1s] The trees remember everything. Every secret shared in their shade. Every sorrow hidden beneath their canopy. Every love that bloomed and died here. [pause 2s] The homes around us are beautiful. But beauty here is always watching. Always listening. Always remembering.",
        duration_sec: 70
      },

      late_arrival: {
        text: "The oak trees remember everything. Three hundred years of Savannah's secrets hang in this moss.",
        duration_sec: 15
      }
    },

    {
      id: 3,
      order: 4,
      name: "Monument Area — History Unresolved",
      location: "Chippewa Square area",
      lat: 32.074100,
      lng: -81.093800,

      voice_archetype: "guide",
      truth_type: "fact",
      theme: "History — The Unresolved",
      ambient_audio: "/audio/ambient-city-square-stone.mp3",

      late_arrival: {

    },

    {
      id: 4,
      order: 5,

      lng: -81.095635,

      voice_archetype: "spirit",
      truth_type: "legend",
      theme: "Tragedy — Hidden Beneath Beauty",
      ambient_audio: "/audio/ambient-fountain-water-echo.mp3",

        text: "You're approaching the fountain. The most beautiful place in Savannah. Remember that.",

    {

      order: 8,

      location: "Corner of Jones & Bull Street",

// ============================================================================
// STATE MANAGEMENT
// ============================================================================

let map;
let currentStopIndex = 0;
let userLocation = null;
let arrivalState = "manual"; // "early", "on_time", "late", "manual"
let markers = [];
let routePolyline = null;
let gpsWatchId = null;

// ============================================================================
// INITIALIZATION
// ============================================================================

function initApp() {
  initMap();
  renderCurrentStop();
  startGPS();
}

function initMap() {
  map = L.map('map').setView([32.0730, -81.0900], 14);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OSM &copy; CARTO',
    maxZoom: 19
  }).addTo(map);
  map.attributionControl.setPrefix(false);

  // Create markers
  TOUR_DATA.stops.forEach((stop, idx) => {
    const icon = L.divIcon({
      className: `stop-marker`,
      html: `<div class="marker-dot"></div>`,
      iconSize: [18, 18],
      iconAnchor: [9, 9]
    });

    const marker = L.marker([stop.lat, stop.lng], { icon })
      .addTo(map)
      .bindTooltip(`${stop.order}. ${stop.name}`, {
        permanent: false,
        direction: 'top',
        offset: [0, -10]
      });

    marker.on('click', () => jumpToStop(idx));
    markers.push(marker);
  });

  // Route polyline
  const routeCoords = TOUR_DATA.stops.map(stop => [stop.lat, stop.lng]);
  routePolyline = L.polyline(routeCoords, {
    color: '#c9a876',
    weight: 2,
    opacity: 0.3,
    dashArray: '5,5'
  }).addTo(map);
}

// ============================================================================
// ARRIVAL STATE DETECTION
// ============================================================================

function startGPS() {
  if ('geolocation' in navigator) {
    gpsWatchId = navigator.geolocation.watchPosition(
      (position) => {
        userLocation = {
          lat: position.coords.latitude,
          lng: position.coords.longitude,
          accuracy: position.coords.accuracy
        };
        detectArrivalState();
      },
      (error) => {
        console.log('GPS available for GPS-triggered mode');
        document.getElementById('gpsStatus').textContent = '📍 GPS Available';
      }
    );
  }
}

function detectArrivalState() {
  if (!userLocation) return;

  const stop = TOUR_DATA.stops[currentStopIndex];
  const distance = calculateDistance(
    userLocation.lat, userLocation.lng,
    stop.lat, stop.lng
  );

  const radiusM = stop.gps_radius_m || 40;

  if (distance < radiusM) {
    // Triggered!
    arrivalState = "on_time";
    showProximityAlert(`✓ You've arrived at: ${stop.name}`);
    renderCurrentStop();
  } else if (distance < radiusM * 2) {
    arrivalState = "early";
    document.getElementById('gpsStatus').textContent = `📍 ${Math.round(distance)}m away`;
  }
}

function calculateDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000; // Earth radius in meters
  const φ1 = (lat1 * Math.PI) / 180;
  const φ2 = (lat2 * Math.PI) / 180;
  const Δφ = ((lat2 - lat1) * Math.PI) / 180;
  const Δλ = ((lng2 - lng1) * Math.PI) / 180;
  const a = Math.sin(Δφ / 2) * Math.sin(Δφ / 2) + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ / 2) * Math.sin(Δλ / 2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
}

// ============================================================================
// STOP RENDERING WITH ARRIVAL MODES
// ============================================================================

function renderCurrentStop() {
  const stop = TOUR_DATA.stops[currentStopIndex];
  const container = document.getElementById('storyContent');

  // Progress
  const progress = ((currentStopIndex + 1) / TOUR_DATA.stops.length) * 100;
  document.getElementById('progressFill').style.width = progress + '%';

  // Determine narration based on arrival state
  let narrationMode;
  let narrationText;
  let stateLabel;

  if (arrivalState === "early") {
    narrationMode = stop.early_arrival;
    stateLabel = "early";
  } else if (arrivalState === "on_time") {
    narrationMode = stop.on_time;
    stateLabel = "on-time";
  } else {
    // manual or late
    narrationMode = stop.late_arrival;
    stateLabel = arrivalState === "late" ? "late" : "manual";
  }

  let html = `<div class="stop-card">`;

  // Header
  html += `<div class="stop-header">`;
  html += `<div class="stop-number">Stop ${stop.order} of ${TOUR_DATA.stops.length}</div>`;
  html += `<div class="stop-name">${stop.name}</div>`;

  // Badges
  const stateClass = `arrival-${stateLabel}`;
  html += `<span class="arrival-state ${stateClass}">${stateLabel}</span>`;

  const truthClass = `truth-${stop.truth_type}`;
  const truthLabel = stop.truth_type === "theatrical" ? "Theatrical" : stop.truth_type === "legend" ? "Legend" : "Fact";
  html += `<span class="truth-badge ${truthClass}">${truthLabel}</span>`;

  html += `</div>`;

  // Theme
  html += `<p style="color: #8b7d60; font-size: 11px; margin-bottom: 12px; letter-spacing: 0.5px; text-transform: uppercase;">${stop.theme}</p>`;

  // Narration
  html += `<div class="narration-text">${narrationMode.text}</div>`;

  // Audio player
  const audioFile = narrationMode.audio_file || `/audio/stop-${stop.order}-${stop.name.toLowerCase().replace(/\s+/g, '-')}-${stateLabel}.mp3`;
  html += `
  <div class="audio-player">
    <div class="audio-controls">
      <button class="play-btn" onclick="playAudio('${audioFile}', this)" title="Play narration">▶</button>
      <div class="audio-progress">
        <div class="progress-track" onclick="seekAudio(event, '${audioFile}')">
          <div class="progress-fill" id="progressFill-${stop.id}"></div>
        </div>
        <div class="audio-time">
          <span id="currentTime-${stop.id}">0:00</span>
          <span id="duration-${stop.id}">${formatTime(narrationMode.duration_sec)}</span>
        </div>
      </div>
    </div>
  </div>`;

  // Walking info (to next stop)
  if (currentStopIndex < TOUR_DATA.stops.length - 1) {
    const nextStop = TOUR_DATA.stops[currentStopIndex + 1];
    html += `<div class="walking-info">
      📍 Next Stop: ${nextStop.name}<br>
      Walk at a steady pace to the next location
    </div>`;
  } else {
    html += `<div class="walking-info" style="background: rgba(102, 187, 106, 0.15); border-color: rgba(102, 187, 106, 0.4);">
      ✓ Final Stop<br>
      You've walked through Savannah's memory. Take time to reflect.
    </div>`;
  }

  html += `</div>`;

  container.innerHTML = html;

  // Update buttons
  document.getElementById('prevBtn').disabled = currentStopIndex === 0;
  document.getElementById('nextBtn').disabled = currentStopIndex === TOUR_DATA.stops.length - 1;

  // Center map
  map.setView([stop.lat, stop.lng], 15);

  // Highlight marker
  markers.forEach((marker, idx) => {
    marker.setIcon(L.divIcon({
      className: `stop-marker ${idx === currentStopIndex ? 'active' : ''}`,
      html: `<div class="marker-dot"></div>`,
      iconSize: [18, 18],
      iconAnchor: [9, 9]
    }));
  });

  // Reset arrival state for manual navigation
  arrivalState = "manual";
  document.getElementById('gpsStatus').textContent = '📍 GPS Ready';
}

function nextStop() {
  if (currentStopIndex < TOUR_DATA.stops.length - 1) {
    currentStopIndex++;
    renderCurrentStop();
  }
}

function previousStop() {
  if (currentStopIndex > 0) {
    currentStopIndex--;
    renderCurrentStop();
  }
}

function jumpToStop(idx) {
  currentStopIndex = idx;
  renderCurrentStop();
}

// ============================================================================
// UI HELPERS
// ============================================================================

function showProximityAlert(message) {
  const alert = document.getElementById('proximityAlert');
  alert.textContent = message;
  alert.classList.add('show');
  setTimeout(() => alert.classList.remove('show'), 3000);
}

// ============================================================================
// AUDIO PLAYBACK FUNCTIONS
// ============================================================================

let currentAudioButton = null;

function playAudio(audioFile, buttonEl) {
  const audio = document.getElementById('narrationAudio');

  // If clicking same button, toggle play/pause
  if (currentAudioButton === buttonEl && !audio.paused) {
    audio.pause();
    buttonEl.textContent = '▶';
    buttonEl.classList.remove('playing');
    return;
  }

  // Stop previous audio
  if (currentAudioButton && currentAudioButton !== buttonEl) {
    audio.pause();
    currentAudioButton.textContent = '▶';
    currentAudioButton.classList.remove('playing');
  }

  // Load and play new audio
  audio.src = audioFile;
  audio.play().catch(err => {
    console.log('Audio playback unavailable:', err);
    buttonEl.textContent = '⊘';
  });

  buttonEl.textContent = '⏸';
  buttonEl.classList.add('playing');
  currentAudioButton = buttonEl;

  // Update progress as it plays
  audio.ontimeupdate = () => {
    updateAudioProgress(audio);
  };

  audio.onended = () => {
    buttonEl.textContent = '▶';
    buttonEl.classList.remove('playing');
  };
}

function seekAudio(event, audioFile) {
  const audio = document.getElementById('narrationAudio');
  if (audio.src !== audioFile) {
    audio.src = audioFile;
  }

  const track = event.currentTarget;
  const clickX = event.offsetX;
  const width = track.offsetWidth;
  const seekTime = (clickX / width) * audio.duration;

  audio.currentTime = seekTime;
}

function updateAudioProgress(audio) {
  const currentBtn = currentAudioButton;
  if (!currentBtn) return;

  const stopId = currentBtn.closest('.stop-card') ?
    currentBtn.closest('.stop-card').querySelector('.stop-number').textContent.match(/\d+/)[0] :
    null;

  if (stopId) {
    const progress = (audio.currentTime / audio.duration) * 100 || 0;
    const progressEl = document.getElementById(`progressFill-${stopId - 1}`);
    const timeEl = document.getElementById(`currentTime-${stopId - 1}`);

    if (progressEl) progressEl.style.width = progress + '%';
    if (timeEl) timeEl.textContent = formatTime(audio.currentTime);
  }
}

function formatTime(seconds) {
  if (!seconds || isNaN(seconds)) return '0:00';
  const mins = Math.floor(seconds / 60);
  const secs = Math.floor(seconds % 60);
  return `${mins}:${secs.toString().padStart(2, '0')}`;
}

// ============================================================================
// STARTUP
// ============================================================================

document.addEventListener('DOMContentLoaded', initApp);

window.addEventListener('beforeunload', () => {
  if (gpsWatchId) {
    navigator.geolocation.clearWatch(gpsWatchId);
  }
});
</script>
