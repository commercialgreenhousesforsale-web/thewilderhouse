<!doctype html>
<html lang="en">
<head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-ZFYB0TMJR4"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-ZFYB0TMJR4');</script>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Right Now in Savannah</title>
<meta name="robots" content="noindex, follow"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,700;1,400&display=optional" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,700;1,400&display=optional"></noscript>
<style>
:root{
  --g:#2a3c30;--g2:#3d5444;--gold:#c2a032;--gol:#e8c96a;
  --cr:#faf9f7;--cd:#f0ede7;--tx:#2e2e2e;--mu:#5e5e5e;--wh:#ffffff;
  --terra:#8a4a1e;--sky:#3d6278;
  --rule:rgba(42,60,48,.12);--rule-soft:rgba(42,60,48,.07);
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'DM Sans',system-ui,sans-serif;
  --mono:ui-monospace,'SF Mono',Menlo,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--cr);color:var(--tx);font-family:var(--sans);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none}
img{max-width:100%;display:block}

.container{max-width:100%;padding:20px;margin:0 auto}

/* ── RIGHT NOW CARD ───────────────────────── */
.rn-card{display:grid;grid-template-columns:1.6fr 1fr;border:2px solid var(--g);border-radius:24px;overflow:hidden;background:#fff;box-shadow:8px 8px 0 rgba(42,60,48,.1);min-height:280px}
@media(max-width:768px){.rn-card{grid-template-columns:1fr;box-shadow:4px 4px 0 rgba(42,60,48,.1)}}
.rn-left{padding:32px;border-right:1px solid var(--rule);display:flex;flex-direction:column}
@media(max-width:768px){.rn-left{border-right:none;border-bottom:1px solid var(--rule);padding:28px}}
.rn-kicker{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--terra);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.rn-pulse{width:8px;height:8px;border-radius:50%;background:var(--terra);animation:rnp 1.8s ease-out infinite}
@keyframes rnp{0%{box-shadow:0 0 0 0 rgba(138,74,30,.55)}70%{box-shadow:0 0 0 10px rgba(138,74,30,0)}100%{box-shadow:0 0 0 0 rgba(138,74,30,0)}}
.rn-title{font-family:var(--serif);font-size:clamp(1.8rem,4vw,2.8rem);font-weight:400;line-height:1.1;letter-spacing:-.01em;margin-bottom:12px;display:flex;align-items:flex-start;gap:12px}
.rn-emoji{font-size:1.4em;flex-shrink:0}
.rn-reason{font-family:var(--serif);font-style:italic;font-size:1.1rem;color:var(--tx);margin-bottom:20px;line-height:1.5}
.rn-meta{display:flex;flex-wrap:wrap;gap:14px 28px;font-size:13px;margin-top:auto}
.rn-mi{display:flex;flex-direction:column;gap:3px}
.rn-mi-label{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--mu);font-weight:600}
.rn-mi-value{color:var(--tx);font-weight:700;font-size:14px}
.rn-right{padding:28px;background:linear-gradient(180deg,var(--cd),var(--cr));position:relative;overflow:hidden;display:flex;flex-direction:column;gap:18px}
.rn-bg-glyph{position:absolute;right:-20px;top:-30px;font-size:180px;opacity:.05;pointer-events:none;user-select:none;line-height:1}
.rn-section-label{font-family:var(--mono);font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--mu);margin-bottom:12px;margin-top:4px}
.rn-next{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-top:1px dashed var(--rule)}
.rn-next-emoji{font-size:20px;flex-shrink:0;line-height:1}
.rn-next-title{font-family:var(--serif);font-size:.95rem;font-weight:500;color:var(--g);line-height:1.2}
.rn-next-place{font-size:11px;color:var(--mu);margin-top:2px}

/* ── FOOTER ───────────────────────────────── */
.footer-link{display:block;margin-top:24px;text-align:center;font-size:12px;color:var(--mu)}
.footer-link a{color:var(--g);text-decoration:underline;font-weight:600}

/* ── SKELETON ─────────────────────────────── */
.sk{display:inline-block;background:linear-gradient(90deg,var(--rule),rgba(42,60,48,.07),var(--rule));background-size:200% 100%;animation:shimmer 1.4s ease infinite;border-radius:4px;color:transparent}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

@media(max-width:600px){
  .rn-title{font-size:1.6rem}
  .container{padding:12px}
}
</style>
</head>
<body>

<div class="container">
  <div class="rn-card">
    <div class="rn-left">
      <div class="rn-kicker"><span class="rn-pulse"></span><span id="rnTime">Right now</span></div>
      <h2 class="rn-title">
        <span class="rn-emoji" id="rnEmoji">🗺</span>
        <span id="rnTitle"><span class="sk" style="width:280px;height:48px;display:inline-block"></span></span>
      </h2>
      <p class="rn-reason" id="rnReason"><span class="sk" style="width:90%;height:20px;display:block;margin-bottom:8px"></span><span class="sk" style="width:70%;height:20px;display:block"></span></p>
      <div class="rn-meta" id="rnMeta"></div>
    </div>
    <div class="rn-right">
      <div class="rn-bg-glyph" id="rnBgGlyph"></div>
      <div class="rn-section-label">Next best options</div>
      <div id="rnNext"></div>
    </div>
  </div>

  <div class="footer-link">
    <a href="https://forsythparkvacationrentals.com/right-now" target="_blank" rel="noopener noreferrer">Powered by Right Now Savannah →</a>
  </div>
</div>

<script>
const ACTIVITIES=[
  {id:'forsyth-fountain',cat:'Park',g:'⛲',indoor:false,free:true,price:'Free',place:'4 min walk',title:'Forsyth Park & the Fountain',desc:'The iconic 1858 fountain. Thirty acres of live oaks and Spanish moss.',hours:[7,20],weather:['clear','cloudy'],who:['solo','family','romantic']},
  {id:'picnic',cat:'Park',g:'🧺',indoor:false,free:true,price:'Free',place:'Forsyth Park',title:'Picnic in Forsyth Park',desc:'Legal open container. Grab wine from Brighter Day, spread a blanket.',hours:[9,20],weather:['clear','cloudy'],who:['solo','family','romantic']},
  {id:'river-stroll',cat:'Outdoors',g:'🚶',indoor:false,free:true,price:'Free',place:'River Street',title:'River Street Stroll',desc:'Cobblestones, ships, buskers. Best at golden hour.',hours:[17,21],weather:['clear','cloudy'],who:['solo','family','romantic']},
  {id:'farmers-market',cat:'Market',g:'🌿',indoor:false,free:true,price:'Free entry',place:'Forsyth Park south end',title:'Forsyth Park Farmers Market',desc:'Local growers, bakers, King of Pops. Saturday mornings year-round.',hours:[9,13],weather:['clear','cloudy'],who:['solo','family','romantic'],days:[6]},
  {id:'broughton',cat:'Shopping',g:'🛍',indoor:false,free:true,price:'Free to browse',place:'Historic District',title:'Broughton Street',desc:'Leopold\'s Ice Cream (order the Rum Bisque). Boutiques, galleries.',hours:[10,19],weather:['clear','cloudy'],who:['solo','family','romantic']},
  {id:'city-market',cat:'Food & Culture',g:'🏪',indoor:false,free:true,price:'Free entry',place:'Historic District',title:'City Market',desc:'Galleries, art studios, live music. American Prohibition Museum here.',hours:[11,21],weather:['clear','cloudy'],who:['solo','family','romantic']},
  {id:'plant-riverside',cat:'Entertainment',g:'⚡',indoor:true,free:true,price:'Free lobby',place:'River Street',title:'Plant Riverside District',desc:'Former 1912 power plant. Free fossil lobby, rooftop bars.',hours:[11,23],weather:['clear','cloudy','rain'],who:['solo','family','romantic']},
  {id:'carriage',cat:'Tour',g:'🐴',indoor:false,free:false,price:'From $28',place:'City Market',title:'Horse & Carriage Tour',desc:'Clip-clop through 22 historic squares with a guide.',hours:[10,20],weather:['clear','cloudy'],who:['family','romantic']},
  {id:'jazz',cat:'Music',g:'🎷',indoor:false,free:true,price:'Free',place:'Johnson & Wright Squares',title:'Jazz in the Squares',desc:'Free local jazz and blues. Grab a to-go drink from a bar.',hours:[18,21],weather:['clear','cloudy'],who:['solo','romantic'],days:[5,6,0]},
  {id:'leopolds',cat:'Food',g:'🍦',indoor:true,free:false,price:'From $4',place:'212 E. Broughton',title:'Leopold\'s Ice Cream',desc:'Scooping since 1919. Rum Bisque. Always a line, worth it.',hours:[11,22],weather:['clear','cloudy','rain'],who:['solo','family','romantic']},
  {id:'trolley',cat:'Tour',g:'🚋',indoor:true,free:false,price:'From $34',place:'River Street',title:'Hop-On Trolley Loop',desc:'Covered, climate-controlled through Historic District.',hours:[10,17],weather:['clear','cloudy','rain'],who:['solo','family']},
  {id:'belles-ferry',cat:'Free Experience',g:'⛴',indoor:false,free:true,price:'Free',place:'River Street',title:'Savannah Belles Ferry',desc:'Free water taxi. Skyline reflected in water at night.',hours:[7,23],weather:['clear','cloudy'],who:['solo','family','romantic']},
];

const today=new Date();
const SAV={lat:32.0809,lng:-81.0912,tz:'America/New_York'};
let weather=null,sun=null;

const ft=(d)=>{if(!d)return'—';return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}).toLowerCase().replace(' ','');};
const compass=(d)=>(['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'])[Math.round(((d%360)/22.5))%16];
const wcat=(code)=>{if(code==null)return'cloudy';if(code<=1)return'clear';if(code<=48)return'cloudy';if(code>=51)return'rain';return'cloudy';};

async function fetchT(url,ms=7000){const c=new AbortController();const id=setTimeout(()=>c.abort(),ms);try{const r=await fetch(url,{signal:c.signal});if(!r.ok)throw new Error(r.status);return await r.json();}finally{clearTimeout(id);}}

function scoreActivities(){
  const h=today.getHours()+today.getMinutes()/60;
  const dow=today.getDay();
  const wc=wcat(weather?.code);
  const isRainy=wc==='rain';
  const riseH=sun?sun.rise.getHours()+sun.rise.getMinutes()/60:6.5;
  const setH=sun?sun.set.getHours()+sun.set.getMinutes()/60:20;
  const inMornGold=sun&&h>=riseH&&h<=riseH+1;
  const inEveGold=sun&&h>=setH-1&&h<=setH+0.2;

  return ACTIVITIES.filter(a=>{
    if(a.days&&!a.days.includes(dow))return false;
    return a.weather.includes(wc)||a.weather.includes('rain');
  }).map(a=>{
    let s=0;
    const[start,end]=a.hours;
    if(h>=start&&h<=end)s+=100-Math.abs((start+end)/2-h)*8;
    else if(h<start)s+=60-(start-h)*10;
    else s+=40-(h-end)*8;
    if(isRainy&&a.indoor)s+=40;
    if(isRainy&&!a.indoor&&!a.weather.includes('rain'))s-=50;
    if(inEveGold&&(a.id==='river-stroll'||a.id==='jazz'||a.id==='belles-ferry'))s+=35;
    if(inMornGold&&(a.id==='forsyth-fountain'))s+=35;
    return{...a,s:Math.max(0,s)};
  }).sort((a,b)=>b.s-a.s);
}

function renderRightNow(){
  const scored=scoreActivities();
  const pick=scored[0];
  if(!pick){
    document.getElementById('rnTitle').innerHTML='Explore freely today';
    document.getElementById('rnReason').innerHTML='The city is yours to discover.';
    return;
  }

  const h=today.getHours()+today.getMinutes()/60;
  const wc=wcat(weather?.code);
  let reason='';
  if(wc==='rain')reason="Rain is falling. Here's what Savannah does best indoors.";
  else if(h>=sun?.set.getHours()-1&&h<=sun?.set.getHours()+0.5)reason=`Golden hour is right now. ~${Math.max(5,Math.round((sun.set.getHours()+1-h)*60))} minutes of soft light.`;
  else if(h<9)reason="The squares are quiet. Morning magic.";
  else if(h<12)reason="Mid-morning. Markets and oak avenues at their best.";
  else if(h<15)reason="Afternoon. Lean toward shade or follow the radar.";
  else if(h<18)reason="Heading toward golden hour.";
  else if(h<21)reason="Evening. Savannah comes alive after the sun drops.";
  else reason="Late night. Ghost stories and warm Savannah dark.";

  document.getElementById('rnTime').textContent=`Right now · ${ft(today)}`;
  document.getElementById('rnEmoji').textContent=pick.g;
  document.getElementById('rnTitle').textContent=pick.title;
  document.getElementById('rnBgGlyph').textContent=pick.g;
  document.getElementById('rnReason').textContent=reason;
  document.getElementById('rnMeta').innerHTML=`
    <div class="rn-mi"><div class="rn-mi-label">Where</div><div class="rn-mi-value">${pick.place}</div></div>
    <div class="rn-mi"><div class="rn-mi-label">Cost</div><div class="rn-mi-value">${pick.price}</div></div>
  `;

  const nexts=scored.slice(1,3);
  document.getElementById('rnNext').innerHTML=nexts.map(a=>`
    <div class="rn-next">
      <div class="rn-next-emoji">${a.g}</div>
      <div>
        <div class="rn-next-title">${a.title}</div>
        <div class="rn-next-place">${a.place}</div>
      </div>
    </div>
  `).join('');
}

async function loadData(){
  try{
    const j=await fetchT(`https://api.open-meteo.com/v1/forecast?latitude=${SAV.lat}&longitude=${SAV.lng}&current=temperature_2m,weather_code,wind_speed_10m,wind_direction_10m,relative_humidity_2m,apparent_temperature&temperature_unit=fahrenheit&wind_speed_unit=mph&timezone=${encodeURIComponent(SAV.tz)}`);
    if(j.current){
      const c=j.current;
      weather={tempF:Math.round(c.temperature_2m),feelsF:Math.round(c.apparent_temperature),code:c.weather_code,wind:Math.round(c.wind_speed_10m),dir:compass(c.wind_direction_10m),hum:Math.round(c.relative_humidity_2m)};
    }
  }catch(e){weather={tempF:76,feelsF:79,code:2,wind:8,dir:'SSW',hum:65};}

  renderRightNow();

  try{
    const ds=today.toISOString().slice(0,10);
    const j=await fetchT(`https://api.sunrise-sunset.org/json?lat=${SAV.lat}&lng=${SAV.lng}&date=${ds}&formatted=0&tzid=${encodeURIComponent(SAV.tz)}`);
    const r=j.results;
    sun={rise:new Date(r.sunrise),set:new Date(r.sunset),noon:new Date(r.solar_noon)};
  }catch(e){
    sun={rise:new Date(new Date(today).setHours(6,30)),set:new Date(new Date(today).setHours(20,10)),noon:new Date(new Date(today).setHours(13,20))};
  }

  renderRightNow();
}

function init(){
  loadData();
  setInterval(()=>location.reload(),300000);
}

init();
</script>
</body>
</html>
