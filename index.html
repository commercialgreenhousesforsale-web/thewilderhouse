<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0805">
  <title>Forsyth Ghost Tour — Savannah Remembers</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%230a0805' width='192' height='192'/><text x='50%' y='50%' font-size='120' fill='%23e7c389' text-anchor='middle' dominant-baseline='middle'>۰</text></svg>">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Georgia', serif;
      background: #0a0805;
      color: #e9dcc6;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
    }

    .header {
      background: rgba(10, 8, 6, 0.95);
      border-bottom: 1px solid rgba(233, 220, 198, 0.1);
      padding: 16px;
      text-align: center;
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .header h1 {
      font-size: 20px;
      color: #e7c389;
      margin-bottom: 4px;
      font-weight: 400;
    }

    .header p {
      font-size: 10px;
      color: #8b7d60;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .status-display {
      font-size: 11px;
      color: #66bb6a;
      margin-top: 8px;
      padding: 6px 12px;
      background: rgba(102, 187, 106, 0.1);
      border-radius: 3px;
      display: inline-block;
    }

    .main-content {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    #map {
      flex: 1;
      background: #1a1410;
      position: relative;
    }

    .info-panel {
      width: 100%;
      max-width: 420px;
      background: linear-gradient(180deg, #1a1410 0%, #0d0a08 100%);
      border-left: 1px solid rgba(233, 220, 198, 0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: -8px 0 24px rgba(0, 0, 0, 0.7);
    }

    .info-header {
      background: rgba(10, 8, 6, 0.95);
      border-bottom: 1px solid rgba(233, 220, 198, 0.15);
      padding: 16px;
      text-align: center;
    }

    .info-header h2 {
      font-size: 18px;
      color: #e7c389;
      margin-bottom: 4px;
      font-weight: 400;
    }

    .info-header p {
      font-size: 9px;
      color: #8b7d60;
      letter-spacing: 0.5px;
    }

    .info-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .stop-info {
      background: rgba(42, 37, 32, 0.5);
      border: 1px solid rgba(233, 220, 198, 0.1);
      border-radius: 6px;
      padding: 12px;
    }

    .stop-label {
      font-size: 9px;
      color: #8b7d60;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .stop-title {
      font-size: 16px;
      color: #e7c389;
      margin-bottom: 8px;
    }

    .narration-text {
      font-size: 13px;
      line-height: 1.6;
      color: #d4c5a9;
      margin-bottom: 12px;
      font-style: italic;
    }

    .audio-controls {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    button {
      flex: 1;
      background: rgba(232, 201, 106, 0.15);
      border: 1px solid rgba(232, 201, 106, 0.3);
      color: #e7c389;
      padding: 8px 12px;
      border-radius: 3px;
      cursor: pointer;
      font-family: 'Georgia', serif;
      font-size: 12px;
      transition: all 0.2s ease;
    }

    button:hover {
      background: rgba(232, 201, 106, 0.25);
      border-color: rgba(232, 201, 106, 0.5);
    }

    button:active {
      transform: scale(0.98);
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(233, 220, 198, 0.1);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }

    .progress-fill {
      height: 100%;
      background: rgba(232, 201, 106, 0.6);
      width: 0%;
      transition: width 0.1s linear;
    }

    .time-display {
      font-size: 10px;
      color: #8b7d60;
      margin-top: 4px;
      text-align: center;
    }

    .error-message {
      background: rgba(229, 57, 53, 0.1);
      border: 1px solid rgba(229, 57, 53, 0.3);
      color: #ff9999;
      padding: 10px;
      border-radius: 3px;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .info-content::-webkit-scrollbar {
      width: 6px;
    }

    .info-content::-webkit-scrollbar-track {
      background: transparent;
    }

    .info-content::-webkit-scrollbar-thumb {
      background: rgba(233, 220, 198, 0.2);
      border-radius: 3px;
    }

    @media (max-width: 768px) {
      .main-content {
        flex-direction: column-reverse;
      }

      .info-panel {
        max-width: 100%;
        max-height: 50vh;
      }

      #map {
        min-height: 50vh;
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="header">
      <h1>Forsyth Ghost Tour</h1>
      <p>Savannah Remembers</p>
      <div class="status-display" id="status">Initializing GPS...</div>
    </div>

    <div class="main-content">
      <div id="map"></div>

      <div class="info-panel">
        <div class="info-header">
          <h2 id="stopName">Waiting for location...</h2>
          <p id="stopDistance">—</p>
        </div>

        <div class="info-content">
          <div id="errorContainer"></div>
          <div class="stop-info">
            <div class="stop-label">Current Narration</div>
            <div class="narration-text" id="narrationText">
              Adjusting to your location. When you arrive at a stop, the tour will begin.
            </div>

            <div class="audio-controls">
              <button id="playBtn">▶ Play</button>
              <button id="pauseBtn">⏸ Pause</button>
              <button id="replayBtn">⟲ Replay</button>
            </div>

            <div class="progress-bar">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-display">
              <span id="currentTime">0:00</span> / <span id="duration">0:00</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(err => {
        console.warn('Service Worker registration failed:', err);
      });
    }
  </script>
</body>
</html>
